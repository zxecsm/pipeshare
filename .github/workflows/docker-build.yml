name: Push Docker Image (Manual)

# 手动触发
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推 GHCR 需要写权限

    steps:
      # Checkout 仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 获取动态版本号（生成格式如 20260522-a1b2c3d）
      - name: Generate image tag
        id: version
        run: |
          echo "tag=$(date +'%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # 设置多架构环境
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送多架构镜像
      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pipeshare:latest
            ghcr.io/${{ github.repository_owner }}/pipeshare:${{ steps.version.outputs.tag }}
          cache-from: type=gha # 开启 GitHub Actions 缓存（拉取）
          cache-to: type=gha,mode=max # 开启 GitHub Actions 缓存（写入）
